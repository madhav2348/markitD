name: Build and Deploy MarkItDown Webapp

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: [ '3.9', '3.10', '3.11' ]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8 pytest

    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Test backend
      run: |
        pytest tests/ -v --tb=short || true

    - name: Check file structure
      run: |
        echo "Checking webapp files..."
        test -f index.html && echo "✓ index.html found"
        test -f app.js && echo "✓ app.js found"
        test -f server.py && echo "✓ server.py found"
        test -f requirements.txt && echo "✓ requirements.txt found"

  build-docker:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: false
        tags: markitdown-webapp:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Create deployment artifact
      run: |
        mkdir -p deploy
        cp index.html deploy/
        cp app.js deploy/
        cp server.py deploy/
        cp requirements.txt deploy/
        cp README.md deploy/
        cd deploy && tar -czf ../markitdown-webapp.tar.gz . && cd ..

    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: webapp-build
        path: markitdown-webapp.tar.gz
        retention-days: 30

    - name: Notify deployment
      run: |
        echo "Deployment artifact created: markitdown-webapp.tar.gz"
        echo "Ready for deployment to server"
